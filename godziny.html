<!DOCTYPE html>
<html lang="pl">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Quiz ABC</title>
		<link rel="stylesheet" href="clock-styles.css" />
		<link rel="stylesheet" href="layout.css" />
		<style>
			/* ---- Answer buttons ---- */
			.answers-grid {
				display: flex;
				flex-direction: column;
				gap: var(--gap);
				width: 100%;
			}
			.answer-btn {
				width: 100%;
				min-height: var(--btn-height);
				background: #111;
				border: 2px solid #222;
				border-radius: var(--btn-radius);
				font-size: var(--btn-font);
				font-weight: 600;
				cursor: pointer;
				color: #f0f0f0;
				transition: background 0.2s, border-color 0.2s;
				-webkit-tap-highlight-color: transparent;
			}
			.answer-btn:hover  { background: #1a1a1a; border-color: #444; }
			.answer-btn.correct { background: #16a34a; border-color: #16a34a; color: white; }
			.answer-btn.wrong   { background: #dc2626; border-color: #dc2626; color: white; }

			/* ---- Pasek postępu gwiazdki ---- */
			.star-progress {
				display: flex;
				flex-direction: column;
				gap: clamp(5px, 1vmin, 8px);
				width: 100%;
				padding: clamp(8px, 1.3vmin, 14px) clamp(10px, 1.5vmin, 16px);
				background: #0d0d0d;
				border: 1px solid #222;
				border-radius: var(--btn-radius);
			}
			.star-progress.hidden { display: none; }
			.spi-row {
				display: flex;
				align-items: center;
				gap: clamp(6px, 1vmin, 10px);
			}
			.spi-label {
				font-size: clamp(0.65rem, 1.3vmin, 0.85rem);
				color: #888;
				width: clamp(68px, 11vmin, 90px);
				flex-shrink: 0;
			}
			.spi-track {
				flex: 1;
				height: clamp(6px, 1vmin, 8px);
				background: #222;
				border-radius: 4px;
				overflow: hidden;
			}
			.spi-fill {
				height: 100%;
				border-radius: 4px;
				background: #bb86fc;
				transition: width 0.3s ease;
				width: 0%;
			}
			.spi-fill.spi-streak { background: #f0c040; }
			.spi-fill.done       { background: #16a34a !important; transition: none; }
			.spi-count {
				font-size: clamp(0.65rem, 1.3vmin, 0.85rem);
				color: #888;
				min-width: 2.5em;
				text-align: right;
				flex-shrink: 0;
				font-variant-numeric: tabular-nums;
			}

			/* ---- Expedition mode — ukryj ustawienia ---- */
			.expedition-mode .modal#settingsModal { display: none !important; }
			.expedition-mode #settingsIcon         { display: none; }

			/* ---- FAB Hint ---- */
			.fab-hint {
				position: fixed;
				bottom: 24px; right: 20px;
				z-index: 300;
				width: 48px; height: 48px;
				border-radius: 50%;
				background: #111;
				border: 2px solid #333;
				color: #555;
				font-size: 1.3rem; font-weight: 700;
				cursor: pointer;
				display: flex; align-items: center; justify-content: center;
				transition: color 0.2s, border-color 0.2s, transform 0.2s;
				-webkit-tap-highlight-color: transparent;
				box-shadow: 0 4px 16px rgba(0,0,0,0.6);
			}
			.fab-hint:hover           { color: #f0f0f0; border-color: #555; }
			.fab-hint.active          { border-color: var(--accent-color); color: var(--accent-color); transform: rotate(15deg); }

			/* ---- Hint Toast ---- */
			.hint-toast {
				position: fixed;
				bottom: 84px; left: 50%;
				transform: translateX(-50%) translateY(10px);
				z-index: 299;
				width: min(360px, calc(100vw - 40px));
				background: #1a1a1a;
				border: 1px solid #333;
				border-radius: 16px;
				padding: 14px 18px;
				display: flex; align-items: flex-start; gap: 12px;
				overflow: hidden;
				opacity: 0; pointer-events: none;
				transition: opacity 0.22s ease, transform 0.22s ease;
			}
			.hint-toast.visible        { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
			.hint-toast-icon           { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
			.hint-toast-body           { flex: 1; }
			.hint-toast-title          { font-size: 0.72rem; font-weight: 700; color: var(--accent-color); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
			.hint-toast-msg            { font-size: 0.88rem; color: #ccc; line-height: 1.5; }
			.hint-toast-bar            {
				position: absolute; bottom: 0; left: 0;
				height: 3px; background: var(--accent-color); border-radius: 0 0 16px 16px;
				width: 100%; transform-origin: left; transform: scaleX(0);
			}
			.hint-toast.auto-close .hint-toast-bar { transform: scaleX(1); transition: transform 5s linear; }

			/* ---- Star Overlay ---- */
			.star-overlay {
				position: fixed;
				inset: 0;
				background: rgba(0,0,0,0);
				z-index: 400;
				display: flex;
				align-items: center;
				justify-content: center;
				visibility: hidden;
				transition: background 0.3s ease, visibility 0s 0.3s;
				padding: clamp(16px, 3vmin, 32px);
			}
			.star-overlay.active {
				background: rgba(0,0,0,0.88);
				visibility: visible;
				transition: background 0.3s ease, visibility 0s 0s;
			}
			.star-overlay-box {
				background: #111;
				border: 2px solid #333;
				border-radius: clamp(20px, 3.5vmin, 32px);
				padding: clamp(24px, 4vmin, 48px);
				text-align: center;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: clamp(10px, 1.8vmin, 18px);
				max-width: min(380px, 90vw);
				width: 100%;
				opacity: 0;
				transform: scale(0.9);
				transition: opacity 0.3s ease, transform 0.3s ease;
			}
			.star-overlay.active .star-overlay-box { opacity: 1; transform: scale(1); }
			.star-overlay-stars    { font-size: clamp(2rem, 5vmin, 3.5rem); }
			.star-overlay-title    { font-size: clamp(1.1rem, 2.8vmin, 1.7rem); font-weight: 700; color: #f0f0f0; }
			.star-overlay-subtitle { font-size: clamp(0.8rem, 1.6vmin, 1rem); color: #888; }
			.star-overlay-next {
				width: 100%;
				min-height: var(--btn-height);
				background: #bb86fc;
				border: none;
				border-radius: var(--btn-radius);
				font-size: var(--btn-font);
				font-weight: 700;
				color: #000;
				cursor: pointer;
				transition: background 0.2s;
				-webkit-tap-highlight-color: transparent;
			}
			.star-overlay-next:hover { background: #d4a6ff; }
			.star-overlay-map {
				margin-top: 2px;
				color: #888;
				font-size: clamp(0.82rem, 1.5vmin, 0.95rem);
				text-decoration: none;
				transition: color 0.2s;
				-webkit-tap-highlight-color: transparent;
			}
			.star-overlay-map:hover { color: #f0f0f0; }

			/* ---- Achievement Overlay ---- */
			.achievement-overlay {
				position: fixed;
				inset: 0;
				background: rgba(0,0,0,0);
				z-index: 500;
				display: flex;
				align-items: center;
				justify-content: center;
				visibility: hidden;
				transition: background 0.3s ease, visibility 0s 0.3s;
				padding: clamp(16px, 3vmin, 32px);
			}
			.achievement-overlay.active {
				background: rgba(0,0,0,0.92);
				visibility: visible;
				transition: background 0.3s ease, visibility 0s 0s;
			}
			.achievement-card {
				background: #111;
				border: 2px solid #ffd700;
				border-radius: clamp(20px, 3.5vmin, 32px);
				padding: clamp(24px, 4vmin, 48px);
				text-align: center;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: clamp(8px, 1.5vmin, 14px);
				max-width: min(360px, 90vw);
				width: 100%;
				opacity: 0;
				transform: scale(0.9);
				transition: opacity 0.3s ease, transform 0.3s ease;
				position: relative;
			}
			.achievement-overlay.active .achievement-card { opacity: 1; transform: scale(1); }
			@keyframes achGlow {
				0%, 100% { opacity: 0.3; transform: scale(1); }
				50%       { opacity: 0.6; transform: scale(1.08); }
			}
			.achievement-glow {
				position: absolute;
				inset: -5px;
				border-radius: inherit;
				border: 2px solid #ffd700;
				animation: achGlow 1.8s ease-in-out infinite;
				pointer-events: none;
			}
			.achievement-label     { font-size: clamp(0.65rem, 1.3vmin, 0.8rem); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #ffd700; }
			.achievement-icon-big  { font-size: clamp(3rem, 7vmin, 5rem); line-height: 1; }
			.achievement-name      { font-size: clamp(1.2rem, 2.8vmin, 1.8rem); font-weight: 700; color: #f0f0f0; }
			.achievement-desc      { font-size: clamp(0.8rem, 1.5vmin, 1rem); color: #888; }
			.achievement-counter   { font-size: clamp(0.7rem, 1.2vmin, 0.85rem); color: #555; min-height: 1.1em; }
			.achievement-btn {
				margin-top: clamp(4px, 1vmin, 8px);
				width: 100%;
				min-height: var(--btn-height);
				background: #ffd700;
				border: none;
				border-radius: var(--btn-radius);
				font-size: var(--btn-font);
				font-weight: 700;
				color: #000;
				cursor: pointer;
				transition: background 0.2s;
				-webkit-tap-highlight-color: transparent;
			}
			.achievement-btn:hover { background: #ffe44d; }
		</style>
	</head>
	<body>

		<div class="topbar">
			<a id="backBtn" href="index.html" title="Wróć do menu">
				<svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
					<polyline points="15 18 9 12 15 6"></polyline>
				</svg>
			</a>
			<div class="topbar-right">
				<svg class="icon-btn settings-icon" id="settingsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
					<line x1="4" y1="6" x2="20" y2="6"></line><circle cx="9" cy="6" r="2" fill="currentColor" stroke="none"></circle>
					<line x1="4" y1="12" x2="20" y2="12"></line><circle cx="15" cy="12" r="2" fill="currentColor" stroke="none"></circle>
					<line x1="4" y1="18" x2="20" y2="18"></line><circle cx="10" cy="18" r="2" fill="currentColor" stroke="none"></circle>
				</svg>
			</div>
		</div>

		<div class="result-bar">
			<div class="feedback" id="feedback"></div>
		</div>

		<div class="clock-wrap" id="clockContainer"></div>

		<div class="content-area">
			<div class="star-progress" id="starProgress">
				<div class="spi-row">
					<span class="spi-label">Poprawne</span>
					<div class="spi-track"><div class="spi-fill" id="spCorrect"></div></div>
					<span class="spi-count" id="spCorrectTxt">0/8</span>
				</div>
				<div class="spi-row">
					<span class="spi-label">Seria</span>
					<div class="spi-track"><div class="spi-fill spi-streak" id="spStreak"></div></div>
					<span class="spi-count" id="spStreakTxt">0/6</span>
				</div>
			</div>
			<div class="answers-grid">
				<button class="answer-btn" id="ans0">--:--</button>
				<button class="answer-btn" id="ans1">--:--</button>
				<button class="answer-btn" id="ans2">--:--</button>
			</div>
		</div>

		<div class="modal" id="settingsModal">
			<div class="modal-content">
				<div class="modal-modes">
					<button class="mode-toggle active" data-mode="full">Pełne godziny</button>
					<button class="mode-toggle" data-mode="half">Połówki (30 min)</button>
					<button class="mode-toggle" data-mode="quarter">Kwadranse (15, 45 min)</button>
					<button class="mode-toggle" data-mode="five">Co 5 minut</button>
					<button class="mode-toggle" data-mode="any">Każda minuta</button>
				</div>
				<div class="sound-toggle" id="soundToggleRow">
					<span>Dźwięki</span>
					<div class="toggle-switch active" id="soundToggle"></div>
				</div>
			</div>
		</div>

		<!-- FAB ? -->
		<button class="fab-hint" id="fabHint" onclick="toggleHint()">?</button>

		<!-- Hint Toast -->
		<div class="hint-toast" id="hintToast">
			<span class="hint-toast-icon">💡</span>
			<div class="hint-toast-body">
				<div class="hint-toast-title">Jak to działa?</div>
				<div class="hint-toast-msg">Odczytaj godzinę z zegara i wybierz poprawną odpowiedź spośród trzech opcji.</div>
			</div>
			<div class="hint-toast-bar" id="hintBar"></div>
		</div>

		<!-- Star Overlay -->
		<div class="star-overlay" id="starOverlay">
			<div class="star-overlay-box">
				<div class="star-overlay-stars" id="starOverlayStars">⭐</div>
				<div class="star-overlay-title" id="starOverlayTitle">Gwiazdka zdobyta!</div>
				<div class="star-overlay-subtitle" id="starOverlaySubtitle">Doskonała robota!</div>
				<button class="star-overlay-next" id="starOverlayNext" style="display:none">▶ Zagraj dalej</button>
				<a class="star-overlay-map" id="starOverlayMap" href="mapa.html">← Wróć do Mapy</a>
			</div>
		</div>

		<!-- Achievement Overlay (Phase 6) -->
		<div class="achievement-overlay" id="achievementOverlay">
			<div class="achievement-card">
				<div class="achievement-glow"></div>
				<div class="achievement-label">Nowa odznaka!</div>
				<div class="achievement-icon-big" id="achievementIcon">🥇</div>
				<div class="achievement-name" id="achievementName">Pierwsze Kroki</div>
				<div class="achievement-desc" id="achievementDesc">—</div>
				<div class="achievement-counter" id="achievementCounter"></div>
				<button class="achievement-btn" id="achievementBtn">Super! 🎉</button>
			</div>
		</div>

		<script src="clock-renderer.js"></script>
		<script src="game-state.js"></script>
		<script src="question-logic.js"></script>
		<script>
			// Anti-rust check
			if (typeof isRusty === 'function' && isRusty()) document.body.classList.add('rusty');

			// ==================== URL Params & Expedition Mode ====================
			const urlParams      = new URLSearchParams(window.location.search);
			const expeditionNode = urlParams.get('node');
			const expeditionStar = parseInt(urlParams.get('star') || '0', 10);
			const isExpedition   = !!expeditionNode && expeditionStar >= 1;

			// NODE_CONFIG — definicja węzłów (wspólna dla wszystkich trybów gry)
			// minutes        — pełna pula dla trybu sandbox / pola ustawień
			// exclusiveMinutes — tylko minuty charakterystyczne dla tej wyspy (tryb Wyprawa)
			const _EXCL_QUARTERS    = [15, 45];
			const _EXCL_HALF        = [30];
			const _EXCL_EVERY_FIVE  = [5,10,20,25,35,40,50,55];
			const _EXCL_EVERY_MIN   = Array.from({length:60},(_,i)=>i).filter(m => m % 5 !== 0);
			const NODE_CONFIG = {
				'full-hours':     { minutes: [0],                                              exclusiveMinutes: [0],               dialType: 'arabic', label: 'Wyspa Pełnych Godzin',      icon: '🏝️' },
				'quarters':       { minutes: [0,15,30,45],                                     exclusiveMinutes: _EXCL_QUARTERS,    dialType: 'arabic', label: 'Zatoka Kwadransów',          icon: '🌊' },
				'half-past':      { minutes: [0,30],                                           exclusiveMinutes: _EXCL_HALF,        dialType: 'arabic', label: 'Góry Wpół do',               icon: '🏔️' },
				'every-five':     { minutes: [0,5,10,15,20,25,30,35,40,45,50,55],              exclusiveMinutes: _EXCL_EVERY_FIVE,  dialType: 'arabic', label: 'Dolina Co Pięć Minut',        icon: '🌿' },
				'every-minute':   { minutes: Array.from({length:60},(_,i)=>i),                 exclusiveMinutes: _EXCL_EVERY_MIN,   dialType: 'arabic', label: 'Morze Każdej Minuty',         icon: '🌊' },
				'roman-full':     { minutes: [0],                                              exclusiveMinutes: [0],               dialType: 'roman',  label: 'Wyspa Cyfr Rzymskich',        icon: '🏛️' },
				'roman-quarters': { minutes: [0,15,30,45],                                     exclusiveMinutes: _EXCL_QUARTERS,    dialType: 'roman',  label: 'Forum Kwadransów',            icon: '🗿' },
				'roman-half':     { minutes: [0,30],                                           exclusiveMinutes: _EXCL_HALF,        dialType: 'roman',  label: 'Koloseum Wpół do',            icon: '⚔️' },
				'roman-five':     { minutes: [0,5,10,15,20,25,30,35,40,45,50,55],              exclusiveMinutes: _EXCL_EVERY_FIVE,  dialType: 'roman',  label: 'Akwedukt Minut',              icon: '🌁' },
				'roman-minute':   { minutes: Array.from({length:60},(_,i)=>i),                 exclusiveMinutes: _EXCL_EVERY_MIN,   dialType: 'roman',  label: 'Labirynt Caesara',            icon: '🔱' },
				'blank-full':     { minutes: [0],                                              exclusiveMinutes: [0],               dialType: 'blank',  label: 'Wyspa Ciszy',                 icon: '🌑' },
				'blank-quarters': { minutes: [0,15,30,45],                                     exclusiveMinutes: _EXCL_QUARTERS,    dialType: 'blank',  label: 'Mglisty Przylądek',           icon: '🌫️' },
				'blank-half':     { minutes: [0,30],                                           exclusiveMinutes: _EXCL_HALF,        dialType: 'blank',  label: 'Dolina Cienia',               icon: '🌒' },
				'blank-five':     { minutes: [0,5,10,15,20,25,30,35,40,45,50,55],              exclusiveMinutes: _EXCL_EVERY_FIVE,  dialType: 'blank',  label: 'Pustynia Bez Znaków',         icon: '🏜️' },
				'blank-minute':   { minutes: Array.from({length:60},(_,i)=>i),                 exclusiveMinutes: _EXCL_EVERY_MIN,   dialType: 'blank',  label: 'Mroczne Bezdroża',            icon: '🌑' },
				'24h-full':       { minutes: [0],                                              exclusiveMinutes: [0],               hourFormat: '24',   label: 'Brama Południa',              icon: '🌃' },
				'24h-quarters':   { minutes: [0,15,30,45],                                     exclusiveMinutes: _EXCL_QUARTERS,    hourFormat: '24',   label: 'Wieża Zegarowa',              icon: '🗼' },
				'24h-half':       { minutes: [0,30],                                           exclusiveMinutes: _EXCL_HALF,        hourFormat: '24',   label: 'Kanał Wpół do',               icon: '🌉' },
				'24h-five':       { minutes: [0,5,10,15,20,25,30,35,40,45,50,55],              exclusiveMinutes: _EXCL_EVERY_FIVE,  hourFormat: '24',   label: 'Metro Nocne',                 icon: '🚇' },
				'24h-minute':     { minutes: Array.from({length:60},(_,i)=>i),                 exclusiveMinutes: _EXCL_EVERY_MIN,   hourFormat: '24',   label: 'Labirynt 24h',                icon: '🌐' },
			};

			const nodeConf          = isExpedition ? (NODE_CONFIG[expeditionNode] || null) : null;
			const expeditionMinutes = nodeConf ? (nodeConf.exclusiveMinutes || nodeConf.minutes) : null;

			if (isExpedition) {
				document.body.classList.add('expedition-mode');
				document.getElementById('backBtn').href = 'mapa.html';
			}

			const STORAGE_KEYS = {
				activeModes: 'zegar_activeModes',
				soundEnabled: 'zegar_soundEnabled',
				clockBg: 'zegar_clockBg',
				handColor: 'zegar_handColor',
				numberStyle: 'zegar_numberStyle',
				hourFormat: 'zegar_hourFormat',
			};

			function loadGlobalSettings() {
				let ns = localStorage.getItem(STORAGE_KEYS.numberStyle) || 'arabic';
				let hf = localStorage.getItem(STORAGE_KEYS.hourFormat) || '12';
				if (nodeConf) {
					if (nodeConf.dialType) ns = nodeConf.dialType === 'blank' ? 'none' : nodeConf.dialType;
					if (nodeConf.hourFormat) hf = nodeConf.hourFormat;
				}
				return {
					activeModes:  JSON.parse(localStorage.getItem(STORAGE_KEYS.activeModes)) || ['full'],
					soundEnabled: localStorage.getItem(STORAGE_KEYS.soundEnabled) !== 'false',
					clockBg:      localStorage.getItem(STORAGE_KEYS.clockBg) || 'solid',
					handColor:    localStorage.getItem(STORAGE_KEYS.handColor) || 'white',
					numberStyle:  ns,
					hourFormat:   hf,
				};
			}

			const globalSettings = loadGlobalSettings();

			// ==================== Initialize Clock ====================
			const clockContainer = document.getElementById('clockContainer');
			const clock = new ClockRenderer(clockContainer, {
				size: 'sm',
				interactive: false,
				showBrand: true,
				showDigital: true,
				showDate: true,
				showAmPm: globalSettings.hourFormat === '24',
				showSecondHand: false,
				showBgControls: false,
				handColor: globalSettings.handColor,
			});
			clock.setBackground(globalSettings.clockBg);
			clock.setNumberStyle(globalSettings.numberStyle);

			// ==================== DOM & Game Variables ====================
			const feedbackEl   = document.getElementById('feedback');

			const answerButtons = [
				document.getElementById('ans0'),
				document.getElementById('ans1'),
				document.getElementById('ans2'),
			];

			let currentTime    = { hour: 12, minute: 0 };
			let correctIndex   = 0;
			let totalAnswers   = 0;
			let correctAnswers = 0;
			let attempts       = 0;
			let activeModes    = new Set(globalSettings.activeModes);
			let soundEnabled   = globalSettings.soundEnabled;
			let hourFormat     = globalSettings.hourFormat;
			let audioContext   = null;
			let attemptHistory = [];

			// ==================== Session State (star condition: 8+6) ====================
			let session         = { total: 0, streak: 0, bestStreak: 0 };
			let starAlreadyEarned = false;

			// ==================== Sync Mode Toggles ====================
			document.querySelectorAll('.mode-toggle').forEach(btn => {
				btn.classList.toggle('active', activeModes.has(btn.dataset.mode));
			});
			document.getElementById('soundToggle').classList.toggle('active', soundEnabled);

			// ==================== Audio ====================
			function initAudioContext() {
				if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
				if (audioContext.state === 'suspended') audioContext.resume();
			}
			function playBeep(frequency, duration) {
				if (!soundEnabled) return;
				initAudioContext();
				const osc  = audioContext.createOscillator();
				const gain = audioContext.createGain();
				osc.connect(gain);
				gain.connect(audioContext.destination);
				osc.frequency.value = frequency;
				osc.type = 'sine';
				gain.gain.setValueAtTime(0.3, audioContext.currentTime);
				gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
				osc.start(audioContext.currentTime);
				osc.stop(audioContext.currentTime + duration / 1000);
			}
			function playSuccess() {
				if (!soundEnabled) return;
				initAudioContext();
				[440, 660].forEach((freq, i) => {
					const osc = audioContext.createOscillator(), g = audioContext.createGain();
					osc.connect(g); g.connect(audioContext.destination);
					osc.frequency.value = freq; osc.type = 'sine';
					const t = audioContext.currentTime + i * 0.13;
					g.gain.setValueAtTime(0.1, t);
					g.gain.exponentialRampToValueAtTime(0.01, t + 0.18);
					osc.start(t); osc.stop(t + 0.18);
				});
			}
			function playError()   { playBeep(220, 300); }

			// ==================== Question Pool ====================
			const MODE_MINUTES = {
				full:    [0],
				half:    [30],
				quarter: [15, 45],
				five:    [0,5,10,15,20,25,30,35,40,45,50,55],
				any:     Array.from({length:60}, (_,i) => i),
			};

			function formatTime(hour, minute) {
				return String(hour).padStart(2,'0') + ':' + String(minute).padStart(2,'0');
			}

			function randomMinute() {
				if (expeditionMinutes) {
					return expeditionMinutes[Math.floor(Math.random() * expeditionMinutes.length)];
				}
				const allMinutes = new Set();
				activeModes.forEach(m => MODE_MINUTES[m].forEach(v => allMinutes.add(v)));
				const arr = Array.from(allMinutes);
				return arr[Math.floor(Math.random() * arr.length)];
			}

			function randomHour() {
				return hourFormat === '24'
					? Math.floor(Math.random() * 23) + 1
					: Math.floor(Math.random() * 12) + 1;
			}

			function generateOptions(correctTime) {
				const mirrorHour = correctTime.hour > 12 ? correctTime.hour - 12 : correctTime.hour + 12;
				const options    = new Set([formatTime(correctTime.hour, correctTime.minute)]);
				while (options.size < 3) {
					const hour   = randomHour();
					const minute = randomMinute();
					if (hourFormat === '24' && hour === mirrorHour && minute === correctTime.minute) continue;
					options.add(formatTime(hour, minute));
				}
				return Array.from(options);
			}

			function shuffle(array) {
				for (let i = array.length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					[array[i], array[j]] = [array[j], array[i]];
				}
				return array;
			}

			// ==================== Progress Bar ====================
			const correctTarget = isExpedition ? 8 : 12;
			function updateProgressBar() {
				const correctPct = Math.min(100, Math.round((session.total / correctTarget) * 100));
				const streakPct  = Math.min(100, Math.round((session.bestStreak / 6) * 100));
				document.getElementById('spCorrect').style.width = correctPct + '%';
				document.getElementById('spStreak').style.width  = streakPct  + '%';
				document.getElementById('spCorrectTxt').textContent = session.total + '/' + correctTarget;
				document.getElementById('spStreakTxt').textContent  = session.bestStreak + '/6';
				if (session.total >= correctTarget) document.getElementById('spCorrect').classList.add('done');
				if (session.bestStreak >= 6) document.getElementById('spStreak').classList.add('done');
			}

			// ==================== Game Logic ====================
			function setNewQuestion() {
				const q = generateQuestion(
					nodeConf || { minutes: (() => {
						const s = new Set();
						activeModes.forEach(m => MODE_MINUTES[m].forEach(v => s.add(v)));
						return Array.from(s);
					})(), hourFormat },
					attemptHistory
				);
				currentTime = { hour: q.hour, minute: q.minute };
				attemptHistory.push({ hour: q.hour, minute: q.minute });
				if (attemptHistory.length > 10) attemptHistory.shift();

				clock.setTime(q.hour, q.minute);
				if (hourFormat === '24') clock.setAmPm(q.hour >= 13);

				const options = shuffle(generateOptions(currentTime));
				correctIndex  = options.indexOf(formatTime(q.hour, q.minute));

				options.forEach((value, idx) => {
					const btn = answerButtons[idx];
					btn.textContent = value;
					btn.className   = 'answer-btn';
					btn.disabled    = false;
					btn.onclick     = () => checkAnswer(idx);
				});

				attempts = 0;
				feedbackEl.textContent = '';
				feedbackEl.className   = 'feedback';
			}

			function checkAnswer(selectedIndex) {
				const correctTimeText = formatTime(currentTime.hour, currentTime.minute);

				if (selectedIndex === correctIndex) {
					answerButtons.forEach(btn => btn.disabled = true);
					feedbackEl.textContent = 'Dobrze! ' + correctTimeText + '.';
					feedbackEl.className   = 'feedback ok';
					answerButtons[selectedIndex].classList.add('correct');
					playSuccess();

					if (attempts === 0) {
						totalAnswers++;
						correctAnswers++;

							// Session tracking
							session.streak++;
							session.total++;
							session.bestStreak = Math.max(session.bestStreak, session.streak);
							updateProgressBar();
						let _answerAch = [];
						if (isExpedition && expeditionNode) {
							const r = reportResult(expeditionNode, expeditionStar, true);
							if (r && r.newAchievements) _answerAch = r.newAchievements;
						} else {
							const r = reportQuickGameResult(true);
							if (r && r.newAchievements) _answerAch = r.newAchievements;
						}

						// Check star condition
						if (isExpedition && !starAlreadyEarned && session.total >= correctTarget && session.bestStreak >= 6) {
							starAlreadyEarned = true;
							const sr = markStarCompleted(expeditionNode, expeditionStar, session.bestStreak);
							const allNew = [..._answerAch];
							if (sr && sr.newAchievements) {
								sr.newAchievements.forEach(a => { if (!allNew.find(p => p.id === a.id)) allNew.push(a); });
							}
							setTimeout(() => {
								if (allNew.length > 0) showAchievementQueue(allNew, showStarOverlay);
								else showStarOverlay();
							}, 2000);
							return;
						}
						// Non-star answer: show achievements if any earned
						if (_answerAch.length > 0) {
							setTimeout(() => showAchievementQueue(_answerAch, null), 1500);
						}
					}
					setTimeout(setNewQuestion, 2000);
				} else {
					answerButtons[selectedIndex].classList.add('wrong');
					answerButtons[selectedIndex].disabled = true;
					playError();

					if (attempts === 0) {
						totalAnswers++;
							attempts = 1;

							// Session: streak reset on first wrong attempt
							session.streak = 0;
							updateProgressBar();
						// Report wrong
						if (isExpedition && expeditionNode) {
							reportResult(expeditionNode, expeditionStar, false);
						} else {
							reportQuickGameResult(false);
						}

						feedbackEl.textContent = 'Spróbuj jeszcze raz!';
						feedbackEl.className   = 'feedback bad';
					} else {
						answerButtons.forEach(btn => btn.disabled = true);
						answerButtons[correctIndex].classList.add('correct');
						feedbackEl.textContent = 'Prawidłowa: ' + correctTimeText + '.';
						feedbackEl.className   = 'feedback bad';
						setTimeout(setNewQuestion, 2500);
					}
				}
			}

			// ==================== Star Overlay ====================
			function showStarOverlay() {
				const starLabels = ['⭐', '⭐⭐', '⭐⭐⭐'];
				document.getElementById('starOverlayStars').textContent = starLabels[expeditionStar - 1] || '⭐';
				document.getElementById('starOverlayTitle').textContent = 'Gwiazdka zdobyta!';
				document.getElementById('starOverlaySubtitle').textContent =
					'Poprawnych: ' + session.total + '  •  Najlepsza seria: ' + session.bestStreak;

				const nextBtn = document.getElementById('starOverlayNext');
				const mapLink = document.getElementById('starOverlayMap');

				// Po ⭐ (star 1) przejdź do ⭐ na NASTĘPNEJ wyspie (ta sama pętla)
				const nodeOrder = Object.keys(NODE_CONFIG);
				const curIdx    = nodeOrder.indexOf(expeditionNode);
				const nextId    = (curIdx !== -1 && curIdx < nodeOrder.length - 1) ? nodeOrder[curIdx + 1] : null;
				const _getLoop  = c => c.hourFormat === '24' ? '24h' : (c.dialType || 'arabic');
				const sameLoop  = nextId && _getLoop(NODE_CONFIG[nextId]) === _getLoop(NODE_CONFIG[expeditionNode]);
				const nextHref  = sameLoop ? 'godziny.html?node=' + nextId + '&star=1' : null;

				if (nextHref) {
					nextBtn.style.display = '';
					nextBtn.onclick = () => { window.location.href = nextHref; };
					mapLink.textContent = '← Mapa';
				} else {
					nextBtn.style.display = 'none';
					mapLink.textContent = '← Wróć do Mapy';
				}

				document.getElementById('starOverlay').classList.add('active');
			}

			// ==================== Achievement Overlay ====================
			let _achQueue = [], _achCallback = null;

			function showAchievementQueue(badges, callback) {
				_achQueue    = badges.slice();
				_achCallback = callback || null;
				_showNextAchievement();
			}

			function _showNextAchievement() {
				if (_achQueue.length === 0) {
					if (_achCallback) _achCallback();
					return;
				}
				const ach = _achQueue.shift();
				document.getElementById('achievementIcon').textContent   = ach.icon;
				document.getElementById('achievementName').textContent   = ach.name;
				document.getElementById('achievementDesc').textContent   = ach.desc;
				document.getElementById('achievementCounter').textContent =
					_achQueue.length > 0
						? `(jeszcze ${_achQueue.length} ${_achQueue.length === 1 ? 'odznaka' : 'odznaki'})`
						: '';
				document.getElementById('achievementBtn').onclick = _dismissAchievement;
				document.getElementById('achievementOverlay').classList.add('active');
			}

			function _dismissAchievement() {
				document.getElementById('achievementOverlay').classList.remove('active');
				setTimeout(_showNextAchievement, 300);
			}

			// ==================== FAB + Toast ====================
			let _hintOpen = false, _hintTimer = null;

			function toggleHint() { _hintOpen ? closeHint() : openHint(); }

			function openHint() {
				_hintOpen = true;
				const fab   = document.getElementById('fabHint');
				const toast = document.getElementById('hintToast');
				const bar   = document.getElementById('hintBar');
				fab.classList.add('active');
				toast.classList.remove('auto-close');
				toast.classList.add('visible');
				bar.style.transition = 'none';
				bar.style.transform  = 'scaleX(0)';
				void bar.offsetWidth;
				toast.classList.add('auto-close');
				clearTimeout(_hintTimer);
				_hintTimer = setTimeout(closeHint, 5000);
			}

			function closeHint() {
				_hintOpen = false;
				clearTimeout(_hintTimer);
				document.getElementById('fabHint').classList.remove('active');
				document.getElementById('hintToast').classList.remove('visible', 'auto-close');
			}

			// ==================== Settings Modal ====================
			const settingsIcon  = document.getElementById('settingsIcon');
			const settingsModal = document.getElementById('settingsModal');

			if (settingsIcon) {
				settingsIcon.addEventListener('click', () => settingsModal.classList.add('active'));
			}
			settingsModal.addEventListener('click', e => {
				if (e.target === settingsModal) settingsModal.classList.remove('active');
			});
			document.addEventListener('keydown', e => {
				if (e.key === 'Escape') settingsModal.classList.remove('active');
			});

			document.querySelectorAll('.mode-toggle').forEach(btn => {
				btn.addEventListener('click', () => {
					const mode = btn.dataset.mode;
					if (activeModes.has(mode)) {
						if (activeModes.size > 1) { activeModes.delete(mode); btn.classList.remove('active'); }
					} else {
						activeModes.add(mode); btn.classList.add('active');
					}
					setNewQuestion();
				});
			});

			const soundToggle = document.getElementById('soundToggle');
			soundToggle.addEventListener('click', () => {
				soundEnabled = !soundEnabled;
				soundToggle.classList.toggle('active');
				if (soundEnabled) { initAudioContext(); playBeep(660, 100); }
			});

			// ==================== Start ====================
			setNewQuestion();
		</script>
	<script src="transitions.js"></script>
	</body>
</html>
