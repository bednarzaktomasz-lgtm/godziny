<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wybór Gracza — Mistrz Czasu</title>
  <link rel="stylesheet" href="layout.css" />
  <style>
    /* ===== PROFIL — page-specific styles ===== */

    .page-content {
      width: min(700px, var(--nav-width));
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .app-title {
      text-align: center;
    }
    .app-title h1 {
      font-size: clamp(1.8rem, 5vmin, 3.5rem);
      font-weight: 700;
      color: #f0f0f0;
    }
    .app-title p {
      font-size: clamp(0.9rem, 1.8vmin, 1.3rem);
      color: #888;
      margin-top: clamp(4px, 0.8vmin, 8px);
    }

    .section-title {
      font-size: clamp(0.8rem, 1.5vmin, 1rem);
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: clamp(6px, 1vmin, 12px);
    }

    /* ---- Profile grid ---- */
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr));
      gap: clamp(10px, 2vmin, 16px);
    }

    .profile-card {
      background: #111;
      border: 2px solid #222;
      border-radius: var(--btn-radius);
      padding: clamp(14px, 2.5vmin, 24px);
      display: flex;
      align-items: center;
      gap: clamp(12px, 2vmin, 20px);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .profile-card:hover {
      background: #1a1a1a;
      border-color: #bb86fc;
    }

    .profile-card-avatar {
      font-size: clamp(2rem, 5vmin, 3rem);
      line-height: 1;
      flex-shrink: 0;
    }
    .profile-card-info {
      flex: 1;
      min-width: 0;
    }
    .profile-card-name {
      font-size: clamp(1rem, 2.2vmin, 1.4rem);
      font-weight: 700;
      color: #f0f0f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-card-meta {
      font-size: clamp(0.72rem, 1.3vmin, 0.9rem);
      color: #888;
      margin-top: 3px;
    }

    .profile-card-actions {
      display: flex;
      gap: clamp(6px, 1vmin, 10px);
      flex-shrink: 0;
    }
    .card-action-btn {
      background: transparent;
      border: 1px solid #333;
      border-radius: 8px;
      color: #888;
      font-size: clamp(0.85rem, 1.6vmin, 1.1rem);
      padding: clamp(4px, 0.7vmin, 8px) clamp(8px, 1.2vmin, 12px);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }
    .card-action-btn:hover {
      color: #f0f0f0;
      border-color: #555;
      background: #1a1a1a;
    }
    .card-action-btn.danger:hover {
      color: #dc2626;
      border-color: #dc2626;
    }

    /* ---- Create form ---- */
    .create-form {
      background: #111;
      border: 2px solid #222;
      border-radius: var(--btn-radius);
      padding: clamp(16px, 3vmin, 36px);
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 2.5vmin, 24px);
    }

    .form-label {
      font-size: clamp(0.8rem, 1.4vmin, 1rem);
      color: #888;
      font-weight: 600;
      margin-bottom: clamp(6px, 1vmin, 10px);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .name-input {
      width: 100%;
      background: #000;
      border: 2px solid #333;
      border-radius: clamp(8px, 1.5vmin, 14px);
      color: #f0f0f0;
      font-size: clamp(1rem, 2vmin, 1.4rem);
      padding: clamp(10px, 1.8vmin, 18px) clamp(12px, 2vmin, 20px);
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .name-input:focus     { border-color: #bb86fc; }
    .name-input::placeholder { color: #555; }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 1.5vmin, 16px);
    }
    .avatar-btn {
      background: #000;
      border: 2px solid #333;
      border-radius: clamp(10px, 1.8vmin, 18px);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(4px, 0.8vmin, 8px);
      padding: clamp(10px, 1.8vmin, 20px) clamp(8px, 1.2vmin, 14px);
      transition: background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
      aspect-ratio: 1;
    }
    .avatar-btn:hover     { background: #1a1a1a; border-color: #555; }
    .avatar-btn.selected  { border-color: #bb86fc; background: #1a1a1a; }

    .av-emoji {
      font-size: clamp(1.5rem, 4vmin, 3rem);
      line-height: 1;
    }
    .av-label {
      font-size: clamp(0.58rem, 1.1vmin, 0.8rem);
      color: #888;
      text-align: center;
    }
    .avatar-btn.selected .av-label { color: #bb86fc; }

    .start-btn {
      width: 100%;
      height: var(--btn-height);
      background: #bb86fc;
      color: #000;
      border: none;
      border-radius: var(--btn-radius);
      font-size: var(--btn-font);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .start-btn:disabled              { background: #333; color: #555; cursor: not-allowed; }
    .start-btn:not(:disabled):hover  { background: #d0a3ff; }

    /* ---- Import button ---- */
    .import-btn {
      width: 100%;
      background: transparent;
      border: 2px solid #222;
      border-radius: var(--btn-radius);
      color: #888;
      font-size: clamp(0.9rem, 1.8vmin, 1.15rem);
      font-weight: 600;
      padding: clamp(12px, 2vmin, 20px);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .import-btn:hover { color: #f0f0f0; border-color: #555; }

    /* ---- Add new toggle ---- */
    .add-new-toggle {
      width: 100%;
      background: transparent;
      border: 2px dashed #333;
      border-radius: var(--btn-radius);
      color: #888;
      font-size: clamp(0.9rem, 1.8vmin, 1.15rem);
      font-weight: 600;
      padding: clamp(12px, 2vmin, 20px);
      cursor: pointer;
      text-align: center;
      transition: color 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .add-new-toggle:hover { color: #f0f0f0; border-color: #555; }

    /* ---- Collapsible ---- */
    .collapsible          { display: none; flex-direction: column; gap: var(--gap); }
    .collapsible.open     { display: flex; }

    /* ---- Status message ---- */
    .status-msg {
      text-align: center;
      font-size: clamp(0.85rem, 1.5vmin, 1.1rem);
      min-height: clamp(20px, 2.5vmin, 28px);
    }
    .status-msg.ok  { color: #16a34a; }
    .status-msg.err { color: #dc2626; }

    /* ---- Topbar ---- */
    .topbar-spacer { width: var(--icon-size); }

    /* ---- Confirm dialog ---- */
    .confirm-msg {
      font-size: clamp(1rem, 2.2vmin, 1.5rem);
      color: #f0f0f0;
      text-align: center;
      margin: 0;
      line-height: 1.4;
    }
    .confirm-actions {
      display: flex;
      gap: clamp(10px, 1.5vmin, 16px);
      justify-content: center;
    }
    .confirm-btn {
      background: #111;
      border: 2px solid #222;
      border-radius: var(--btn-radius);
      color: #f0f0f0;
      font-size: clamp(0.9rem, 2vmin, 1.3rem);
      font-weight: 600;
      padding: clamp(10px, 1.8vmin, 18px) clamp(20px, 3vmin, 36px);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .confirm-btn:hover              { background: #1a1a1a; border-color: #444; }
    .confirm-btn.confirm-cancel     { }
    .confirm-btn.confirm-ok         { background: #dc2626; border-color: #dc2626; color: #fff; }
    .confirm-btn.confirm-ok:hover   { background: #b91c1c; border-color: #b91c1c; }
  </style>
</head>
<body>

  <div class="topbar">
    <div id="topbarLeft">
      <div class="topbar-spacer"></div>
    </div>
    <div class="topbar-right"></div>
  </div>

  <div class="page-content">

    <div class="app-title">
      <h1>⏰ Mistrz Czasu</h1>
      <p>Naucz się czytać zegar — krok po kroku</p>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <!-- Lista istniejących profili -->
    <section id="profileListSection" style="display: none;">
      <div class="section-title">Wybierz gracza</div>
      <div class="profile-grid" id="profileGrid"></div>
    </section>

    <!-- Importuj profil -->
    <button class="import-btn" id="importBtn" style="display: none;">
      Importuj profil 📥
    </button>
    <input type="file" id="importInput" accept=".json" style="display: none;" aria-hidden="true">

    <!-- Dodaj nowego gracza (collapsible gdy są już profile) -->
    <button class="add-new-toggle" id="addNewToggle" style="display: none;">
      ＋ Dodaj nowego gracza
    </button>

    <!-- Formularz tworzenia profilu -->
    <div id="createFormWrapper" class="collapsible">
      <div class="create-form">
        <div>
          <div class="form-label">Twoje imię</div>
          <input
            type="text"
            id="nameInput"
            class="name-input"
            placeholder="Wpisz imię…"
            maxlength="20"
            autocomplete="off"
          />
        </div>
        <div>
          <div class="form-label">Wybierz awatara</div>
          <div class="avatar-grid" id="avatarGrid"></div>
        </div>
        <button class="start-btn" id="startBtn" disabled>
          Zacznij przygodę! 🚀
        </button>
      </div>
    </div>

  </div>

  <!-- Confirm dialog modal -->
  <div class="modal" id="confirmModal" aria-modal="true" role="dialog">
    <div class="modal-content" style="max-width: 380px; gap: clamp(16px, 2.5vmin, 28px);">
      <p class="confirm-msg" id="confirmMsg"></p>
      <div class="confirm-actions">
        <button class="confirm-btn confirm-cancel" id="confirmCancel">Anuluj</button>
        <button class="confirm-btn confirm-ok" id="confirmOk">Usuń</button>
      </div>
    </div>
  </div>

  <script src="game-state.js"></script>
  <script>
    // ===== PAGE INIT =====

    migrateFromLegacy();

    const hasProfiles = getProfiles().length > 0;

    // ---- DOM refs ----
    const topbarLeft     = document.getElementById('topbarLeft');
    const statusMsg      = document.getElementById('statusMsg');
    const profileListSec = document.getElementById('profileListSection');
    const profileGrid    = document.getElementById('profileGrid');
    const importBtn      = document.getElementById('importBtn');
    const importInput    = document.getElementById('importInput');
    const addNewToggle   = document.getElementById('addNewToggle');
    const createFormWrap = document.getElementById('createFormWrapper');
    const nameInput      = document.getElementById('nameInput');
    const avatarGrid     = document.getElementById('avatarGrid');
    const startBtn       = document.getElementById('startBtn');

    let selectedAvatar = null;

    // ---- Helpers ----
    function showStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className   = `status-msg ${type}`;
      if (msg) setTimeout(() => {
        statusMsg.textContent = '';
        statusMsg.className   = 'status-msg';
      }, 4000);
    }

    function formatDate(timestamp) {
      if (!timestamp) return '—';
      return new Date(timestamp).toLocaleDateString('pl-PL', {
        day: 'numeric', month: 'short', year: 'numeric'
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ---- Back arrow when profiles exist ----
    if (hasProfiles) {
      topbarLeft.innerHTML = `
        <a href="index.html" title="Wróć do menu">
          <svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>`;
    }

    // ---- Build avatar grid ----
    Object.entries(AVATARS).forEach(([id, av]) => {
      const btn = document.createElement('button');
      btn.className    = 'avatar-btn';
      btn.dataset.avid = id;
      btn.innerHTML    = `<span class="av-emoji">${av.emoji}</span><span class="av-label">${av.label}</span>`;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedAvatar = id;
        updateStartBtn();
      });
      avatarGrid.appendChild(btn);
    });

    function updateStartBtn() {
      startBtn.disabled = !(nameInput.value.trim().length > 0 && selectedAvatar);
    }

    nameInput.addEventListener('input', updateStartBtn);

    // ---- Build profile list ----
    function buildProfileList() {
      const current = getProfiles();
      profileGrid.innerHTML = '';

      current.forEach(profile => {
        let save = null;
        try {
          const raw = localStorage.getItem(`mistrzCzasu_save_${profile.id}`);
          save = raw ? JSON.parse(raw) : null;
        } catch { /* ignore */ }

        const level     = save?.level     || 1;
        const lastVisit = save?.lastVisit || profile.createdAt;
        const av        = AVATARS[profile.avatar] || AVATARS['boy-1'];

        const card = document.createElement('div');
        card.className = 'profile-card';
        card.innerHTML = `
          <div class="profile-card-avatar">${av.emoji}</div>
          <div class="profile-card-info">
            <div class="profile-card-name">${escapeHtml(profile.name)}</div>
            <div class="profile-card-meta">Poziom ${level} &middot; ${formatDate(lastVisit)}</div>
          </div>
          <div class="profile-card-actions">
            <button class="card-action-btn"        data-action="export" data-id="${escapeHtml(profile.id)}" title="Eksportuj">📥</button>
            <button class="card-action-btn danger" data-action="delete" data-id="${escapeHtml(profile.id)}" title="Usuń">🗑️</button>
          </div>`;

        // Klik w kartę → aktywuj profil → przejdź do menu
        card.addEventListener('click', e => {
          if (e.target.closest('[data-action]')) return;
          switchProfile(profile.id);
          location.href = 'index.html';
        });

        // Przyciski akcji
        card.querySelectorAll('[data-action]').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            if (btn.dataset.action === 'export') {
              exportProfile(btn.dataset.id);
            } else if (btn.dataset.action === 'delete') {
              showConfirm(`Usunąć profil "${profile.name}"?`, 'Usuń', 'Anuluj').then(confirmed => {
                if (confirmed) {
                  deleteProfile(btn.dataset.id);
                  buildProfileList();
                  if (getProfiles().length === 0) {
                    profileListSec.style.display  = 'none';
                    importBtn.style.display        = 'none';
                    addNewToggle.style.display     = 'none';
                    createFormWrap.classList.add('open');
                  }
                }
              });
            }
          });
        });

        profileGrid.appendChild(card);
      });
    }

    // ---- Confirm dialog (replaces browser confirm()) ----
    function showConfirm(message, okLabel = 'Potwierdź', cancelLabel = 'Anuluj') {
      return new Promise(resolve => {
        const modal     = document.getElementById('confirmModal');
        const msgEl     = document.getElementById('confirmMsg');
        const okBtn     = document.getElementById('confirmOk');
        const cancelBtn = document.getElementById('confirmCancel');
        msgEl.textContent    = message;
        okBtn.textContent    = okLabel;
        cancelBtn.textContent = cancelLabel;
        modal.classList.add('active');
        function cleanup(result) {
          modal.classList.remove('active');
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          modal.removeEventListener('click', onBackdrop);
          resolve(result);
        }
        function onOk()       { cleanup(true); }
        function onCancel()   { cleanup(false); }
        function onBackdrop(e){ if (e.target === modal) cleanup(false); }
        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
        modal.addEventListener('click', onBackdrop);
      });
    }

    // ---- Initial layout based on profile presence ----
    if (hasProfiles) {
      profileListSec.style.display  = 'block';
      importBtn.style.display       = 'block';
      addNewToggle.style.display    = 'block';
      buildProfileList();
    } else {
      createFormWrap.classList.add('open');
    }

    // ---- Toggle "Dodaj nowego gracza" ----
    addNewToggle.addEventListener('click', () => {
      const open = createFormWrap.classList.toggle('open');
      addNewToggle.textContent = open ? '✕ Anuluj' : '＋ Dodaj nowego gracza';
    });

    // ---- Utwórz profil ----
    startBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name || !selectedAvatar) return;
      try {
        createProfile(name, selectedAvatar);
        location.href = 'index.html';
      } catch (err) {
        showStatus(err.message, 'err');
      }
    });

    // ---- Importuj profil ----
    importBtn.addEventListener('click', () => importInput.click());
    importInput.addEventListener('change', () => {
      const file = importInput.files[0];
      if (!file) return;
      importInput.value = '';
      importProfile(file)
        .then(profile => {
          showStatus(`Zaimportowano: ${profile.name}`, 'ok');
          profileListSec.style.display = 'block';
          importBtn.style.display      = 'block';
          addNewToggle.style.display   = 'block';
          buildProfileList();
        })
        .catch(err => showStatus(err.message, 'err'));
    });
  </script>
  <script src="transitions.js"></script>
</body>
</html>
