<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wyprawa — Mistrz Czasu</title>
  <link rel="stylesheet" href="layout.css" />
  <style>
    /* ===== MAPA — page-specific styles ===== */

    html {
      scroll-behavior: smooth;
      scroll-snap-type: y proximity;
      scroll-padding-block: 15vh;
    }

    body {
      gap: 0;
      padding: 0 0 80px;
    }

    /* Topbar — sticky, full-width override */
    .topbar {
      width: 100%;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #222;
      z-index: 100;
      padding: clamp(10px, 2vmin, 20px) clamp(14px, 3vw, 32px);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: clamp(8px, 1.5vmin, 14px);
    }

    .topbar-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--icon-size);
      height: var(--icon-size);
      text-decoration: none;
      color: #555;
      transition: color 0.2s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .topbar-back:hover { color: #f0f0f0; }
    .topbar-back svg   { width: 100%; height: 100%; }

    .avatar-link {
      font-size: clamp(1.3rem, 3vmin, 1.9rem);
      background: #111;
      border: 2px solid #222;
      border-radius: 50%;
      width: clamp(34px, 5vmin, 48px);
      height: clamp(34px, 5vmin, 48px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-decoration: none;
      transition: border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .avatar-link:hover { border-color: #555; }

    .player-info { display: flex; flex-direction: column; gap: 2px; }
    .player-name { font-size: clamp(0.82rem, 1.7vmin, 1.05rem); font-weight: 700; }

    .xp-bar-wrap { display: flex; align-items: center; gap: 6px; }
    .xp-label {
      font-size: clamp(0.62rem, 1.1vmin, 0.78rem);
      color: #888;
      white-space: nowrap;
    }
    .xp-bar {
      width: clamp(55px, 11vw, 110px);
      height: 5px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }
    .xp-fill {
      height: 100%;
      background: #bb86fc;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .seconds-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      padding: clamp(4px, 0.7vmin, 7px) clamp(8px, 1.3vmin, 14px);
      font-size: clamp(0.78rem, 1.5vmin, 0.95rem);
      font-weight: 700;
      color: #ffd700;
      white-space: nowrap;
    }

    /* ===== MAP HEADER ===== */
    .map-header {
      text-align: center;
      padding: clamp(24px, 5vmin, 48px) 20px clamp(16px, 3vmin, 32px);
    }
    .map-title {
      font-size: clamp(1.4rem, 4vmin, 2.4rem);
      font-weight: 700;
      color: #bb86fc;
    }

    /* ===== PATH ===== */
    :root {
      --node-gap: clamp(80px, 18vmin, 160px);
      --line-w:   2px;
      --dot-size: 12px;
      --tile-w:   min(280px, 80vw);
    }

    .path-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 0 20px;
    }

    .path-node::after {
      content: '';
      position: absolute;
      bottom: calc(-1 * var(--node-gap));
      left: calc(50% - var(--line-w) / 2);
      width: var(--line-w);
      height: var(--node-gap);
      background: #222;
      z-index: 0;
    }

    .path-node.done:has(+ .path-node.current)::after {
      background: linear-gradient(to bottom,
        color-mix(in srgb, #16a34a 70%, transparent),
        color-mix(in srgb, #bb86fc 70%, transparent)
      );
    }
    .path-node.done:has(+ .path-node.done)::after {
      background: color-mix(in srgb, #16a34a 60%, transparent);
    }
    .path-node.done:has(+ .path-node.loop-sep)::after {
      background: color-mix(in srgb, #16a34a 60%, transparent);
    }
    .path-node.current::after {
      background: linear-gradient(to bottom,
        color-mix(in srgb, #bb86fc 70%, transparent),
        #222
      );
    }

    .path-node {
      position: relative;
      z-index: 1;
      width: var(--tile-w);
      margin-bottom: var(--node-gap);
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .path-node:not(.loop-sep) { scroll-snap-align: center; }

    /* ===== VIGNETTE ===== */
    .scroll-vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.88) 0%,
        rgba(0,0,0,0.30) 18%,
        rgba(0,0,0,0)    30%,
        rgba(0,0,0,0)    70%,
        rgba(0,0,0,0.30) 82%,
        rgba(0,0,0,0.88) 100%
      );
    }

    /* ===== NODE TILE ===== */
    .node-tile {
      background: #111;
      border: 2px solid #222;
      border-radius: clamp(16px, 3vmin, 26px);
      aspect-ratio: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 2vmin, 18px);
      padding: clamp(16px, 3vmin, 28px);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .node-tile:hover                      { background: #1a1a1a; border-color: #444; transform: translateY(-2px); }
    .path-node.current .node-tile         { border-color: #bb86fc; box-shadow: 0 0 0 1px #bb86fc, 0 4px 24px color-mix(in srgb, #bb86fc 25%, transparent); }
    .path-node.current .node-tile:hover   { transform: translateY(-2px); }
    .path-node.done    .node-tile         { border-color: color-mix(in srgb, #16a34a 60%, #222); }
    .path-node.locked  .node-tile         { background: #0d0d0d; border-color: #222; cursor: not-allowed; opacity: 0.55; }
    .path-node.locked  .node-tile:hover   { background: #0d0d0d; border-color: #222; transform: none; }

    .node-icon {
      font-size: clamp(2.8rem, 8vmin, 5rem);
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .node-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(6px, 1.2vmin, 10px);
      width: 100%;
    }
    .node-name {
      font-size: clamp(0.85rem, 1.8vmin, 1.1rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
    }
    .path-node.locked .node-name { color: #888; }

    .node-stars { display: flex; gap: 4px; justify-content: center; }
    .star { font-size: clamp(0.9rem, 1.8vmin, 1.2rem); opacity: 0.25; transition: opacity 0.2s; }
    .star.earned { opacity: 1; }

    .node-progress-bar {
      height: 4px; width: 70%;
      background: #222; border-radius: 2px; overflow: hidden;
    }
    .node-progress-fill {
      height: 100%; background: #bb86fc;
      border-radius: 2px; transition: width 0.6s ease;
    }
    .path-node.done .node-progress-fill { background: #16a34a; }

    .node-badge {
      position: absolute;
      top: clamp(8px, 1.5vmin, 14px);
      right: clamp(10px, 2vmin, 18px);
      font-size: clamp(0.65rem, 1.2vmin, 0.8rem);
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }
    .badge-done    { background: color-mix(in srgb, #16a34a 20%, transparent); color: #16a34a; }
    .badge-current { background: color-mix(in srgb, #bb86fc 20%, transparent); color: #bb86fc; }
    .badge-locked  { background: transparent; color: #555; }

    .node-dot {
      position: absolute; left: 50%; transform: translateX(-50%);
      width: var(--dot-size); height: var(--dot-size);
      border-radius: 50%; background: #000; border: 2px solid #222;
      z-index: 2; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .node-dot.top    { top:    calc(-1 * var(--dot-size) / 2); }
    .node-dot.bottom { bottom: calc(-1 * var(--dot-size) / 2); }

    .path-node.done    .node-dot { border-color: #16a34a; background: #16a34a; }
    .path-node.current .node-dot { border-color: #bb86fc; background: #bb86fc; box-shadow: 0 0 10px color-mix(in srgb, #bb86fc 60%, transparent); }
    .path-node.current .node-dot.bottom { background: #000; border-color: #222; box-shadow: none; }

    /* ===== LOOP SEPARATOR ===== */
    .path-node.loop-sep .node-tile {
      aspect-ratio: auto;
      padding: clamp(10px, 1.8vmin, 16px) clamp(16px, 2.5vmin, 24px);
      flex-direction: row; justify-content: center; gap: 10px;
      background: color-mix(in srgb, #bb86fc 5%, transparent);
      border-color: color-mix(in srgb, #bb86fc 25%, #222);
      border-style: dashed; cursor: default;
    }
    .path-node.loop-sep .node-tile:hover { transform: none; background: color-mix(in srgb, #bb86fc 5%, transparent); border-color: color-mix(in srgb, #bb86fc 25%, #222); }
    .path-node.loop-sep .node-dot { border-color: color-mix(in srgb, #bb86fc 40%, #222); background: #000; }
    .loop-sep-icon  { font-size: 1.4rem; line-height: 1; }
    .loop-sep-label {
      font-size: clamp(0.8rem, 1.5vmin, 0.95rem);
      font-weight: 700;
      color: color-mix(in srgb, #bb86fc 80%, #f0f0f0);
      letter-spacing: 0.3px;
    }

    /* ===== STAR POPUP ===== */
    .star-popup-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      visibility: hidden; transition: background 0.22s ease, visibility 0s 0.22s;
      padding: clamp(16px, 3vmin, 32px) 20px;
    }
    .star-popup-overlay.active { background: rgba(0,0,0,0.7); visibility: visible; transition: background 0.22s ease, visibility 0s 0s; }

    .star-popup {
      background: #111; border: 2px solid #222;
      border-radius: clamp(16px, 3vmin, 28px);
      padding: clamp(20px, 3.5vmin, 36px);
      width: min(440px, 92vw);
      display: flex; flex-direction: column; gap: clamp(12px, 2vmin, 20px);
      opacity: 0; transform: scale(0.95) translateY(8px);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .star-popup-overlay.active .star-popup { opacity: 1; transform: scale(1) translateY(0); }

    .popup-header { display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; }
    .popup-icon   { font-size: clamp(2rem, 5vmin, 3rem); }
    .popup-title  { font-size: clamp(1rem, 2.2vmin, 1.4rem); font-weight: 700; }
    .popup-divider { height: 1px; background: #222; }

    .star-options { display: flex; flex-direction: column; gap: clamp(8px, 1.5vmin, 14px); }
    .star-opt-btn {
      display: flex; align-items: center; gap: clamp(10px, 1.8vmin, 16px);
      background: #000; border: 2px solid #222;
      border-radius: clamp(10px, 1.8vmin, 16px);
      padding: clamp(10px, 1.8vmin, 18px) clamp(14px, 2vmin, 20px);
      color: #f0f0f0; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      text-align: left; width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    .star-opt-btn:hover          { background: #1a1a1a; border-color: #444; }
    .star-opt-btn.earned:hover   { border-color: #bb86fc; }
    .star-opt-game-icon          { font-size: clamp(1.2rem, 2.5vmin, 1.6rem); flex-shrink: 0; }
    .star-opt-body               { flex: 1; min-width: 0; }
    .star-opt-name               { font-size: clamp(0.9rem, 1.8vmin, 1.1rem); font-weight: 600; }
    .star-opt-stars              { font-size: clamp(0.85rem, 1.6vmin, 1.05rem); flex-shrink: 0; white-space: nowrap; letter-spacing: 2px; }
    .star-opt-status             { font-size: clamp(0.75rem, 1.4vmin, 0.9rem); flex-shrink: 0; }
    .status-done                 { color: #16a34a; font-weight: 700; }
    .status-play                 { color: #bb86fc; font-weight: 700; }
    .status-locked               { color: #555; }

    /* ===== FAB HINT ===== */
    .fab-hint {
      position: fixed; bottom: 24px; right: 20px; z-index: 300;
      width: 48px; height: 48px; border-radius: 50%;
      background: #111; border: 2px solid #333; color: #555;
      font-size: 1.3rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, border-color 0.2s, transform 0.2s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    .fab-hint:hover  { color: #f0f0f0; border-color: #555; }
    .fab-hint.active { border-color: #bb86fc; color: #bb86fc; transform: rotate(15deg); }

    .hint-toast {
      position: fixed; bottom: 84px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      z-index: 299; width: min(360px, calc(100vw - 40px));
      background: #1a1a1a; border: 1px solid #333; border-radius: 16px;
      padding: 14px 18px; display: flex; align-items: flex-start; gap: 12px;
      overflow: hidden; opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .hint-toast.visible { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
    .hint-toast-icon    { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
    .hint-toast-body    { flex: 1; }
    .hint-toast-title   { font-size: 0.72rem; font-weight: 700; color: #bb86fc; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .hint-toast-msg     { font-size: 0.88rem; color: #ccc; line-height: 1.5; }
    .hint-toast-bar {
      position: absolute; bottom: 0; left: 0; height: 3px; background: #bb86fc;
      border-radius: 0 0 16px 16px; width: 100%;
      transform-origin: left; transform: scaleX(0);
    }
    .hint-toast.auto-close .hint-toast-bar { transform: scaleX(1); transition: transform 5s linear; }

    /* ===== PATH END ===== */
    .path-end {
      position: relative; z-index: 1;
      margin-top: calc(var(--node-gap) / 2);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .path-end-dot {
      width: 40px; height: 40px; border-radius: 50%;
      background: #0d0d0d; border: 3px solid #222;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; color: #555;
    }
    .path-end-label { font-size: clamp(0.75rem, 1.4vmin, 0.9rem); color: #555; }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-back" title="Wróć do menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </a>
      <a href="profil.html" class="avatar-link" id="playerAvatar" title="Zmień gracza">🧑‍🚀</a>
      <div class="player-info">
        <div class="player-name" id="playerName">—</div>
        <div class="xp-bar-wrap">
          <span class="xp-label" id="levelLabel">Poz. 1</span>
          <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
          <span class="xp-label" id="xpLabel">0 XP</span>
        </div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="seconds-badge" id="secondsBadge">⏳ 0</div>
    </div>
  </div>

  <!-- MAP HEADER -->
  <div class="map-header">
    <div class="map-title">🗺️ Wyprawa</div>
  </div>

  <!-- PATH -->
  <div class="path-container" id="pathContainer"></div>

  <!-- Vignette -->
  <div class="scroll-vignette" aria-hidden="true"></div>

  <!-- FAB ? -->
  <button class="fab-hint" id="fabHint" aria-label="Pomoc">?</button>

  <!-- HINT TOAST -->
  <div class="hint-toast" id="hintToast" role="status" aria-live="polite">
    <span class="hint-toast-icon">💡</span>
    <div class="hint-toast-body">
      <div class="hint-toast-title">Jak to działa?</div>
      <div class="hint-toast-msg">Podążaj ścieżką i zdobywaj gwiazdki na każdej wyspie. Zdobądź ⭐ żeby odblokować kolejną. Każda wyspa ma 3 ćwiczenia — od łatwego do trudnego. Ukończ wszystkie 4 pętle, żeby zostać Mistrzem Czasu!</div>
    </div>
    <div class="hint-toast-bar" id="hintBar"></div>
  </div>

  <!-- STAR POPUP -->
  <div class="star-popup-overlay" id="starPopup" role="dialog" aria-modal="true">
    <div class="star-popup">
      <div class="popup-header">
        <div class="popup-icon"  id="popupIcon">🌊</div>
        <div class="popup-title" id="popupTitle">—</div>
      </div>
      <div class="popup-divider"></div>
      <div class="star-options"  id="starOptions"></div>
    </div>
  </div>

  <script src="game-state.js"></script>
  <script>
    // ===== PAGE INIT =====
    migrateFromLegacy();
    const _profile = getActiveProfile();
    if (!_profile) { location.replace('profil.html'); }
    const _save = loadGame();

    // Populate topbar
    const _av = AVATARS[_profile.avatar] || AVATARS['boy-1'];
    document.getElementById('playerAvatar').textContent = _av.emoji;
    document.getElementById('playerName').textContent   = _profile.name;

    const _xp = getXpProgress(_save);
    document.getElementById('levelLabel').textContent  = `Poz. ${_xp.level}`;
    document.getElementById('xpFill').style.width      = _xp.pct + '%';
    document.getElementById('xpLabel').textContent     = `${_save.xp} / ${_xp.xpPerLevel} XP`;
    document.getElementById('secondsBadge').textContent = `⏳ ${_save.seconds}`;

    // ===== LOOP CONFIG =====
    const LOOP_CONFIG = {
      arabic: { label: 'Pętla 1 — Cyfry Arabskie', icon: '🔢' },
      roman:  { label: 'Pętla 2 — Cyfry Rzymskie',  icon: '🏛️' },
      blank:  { label: 'Pętla 3 — Bez Cyfr',        icon: '🌑' },
      '24h':  { label: 'Pętla 4 — Format 24h',      icon: '🌐' },
    };

    // ===== NODE CONFIG (20 węzłów = 4 pętle × 5 wysp) =====
    const NODE_CONFIG = [
      { id: 'full-hours',     loop: 'arabic', icon: '🏝️', name: 'Wyspa Pełnych Godzin' },
      { id: 'quarters',       loop: 'arabic', icon: '🌊', name: 'Zatoka Kwadransów' },
      { id: 'half-past',      loop: 'arabic', icon: '🏔️', name: 'Góry "Wpół do"' },
      { id: 'every-five',     loop: 'arabic', icon: '🌿', name: 'Dolina Co Pięć Minut' },
      { id: 'every-minute',   loop: 'arabic', icon: '🌀', name: 'Morze Każdej Minuty' },
      { id: 'roman-full',     loop: 'roman',  icon: '🏛️', name: 'Wyspa Cyfr Rzymskich' },
      { id: 'roman-quarters', loop: 'roman',  icon: '🗿', name: 'Forum Kwadransów' },
      { id: 'roman-half',     loop: 'roman',  icon: '⚔️', name: 'Koloseum Wpół do' },
      { id: 'roman-five',     loop: 'roman',  icon: '🌁', name: 'Akwedukt Minut' },
      { id: 'roman-minute',   loop: 'roman',  icon: '🔱', name: 'Labirynt Caesara' },
      { id: 'blank-full',     loop: 'blank',  icon: '🌑', name: 'Wyspa Ciszy' },
      { id: 'blank-quarters', loop: 'blank',  icon: '🌫️', name: 'Mglisty Przylądek' },
      { id: 'blank-half',     loop: 'blank',  icon: '🌒', name: 'Dolina Cienia' },
      { id: 'blank-five',     loop: 'blank',  icon: '🏜️', name: 'Pustynia Bez Znaków' },
      { id: 'blank-minute',   loop: 'blank',  icon: '🌑', name: 'Mroczne Bezdroża' },
      { id: '24h-full',       loop: '24h',    icon: '🌃', name: 'Brama Południa' },
      { id: '24h-quarters',   loop: '24h',    icon: '🗼', name: 'Wieża Zegarowa' },
      { id: '24h-half',       loop: '24h',    icon: '🌉', name: 'Kanał Wpół do' },
      { id: '24h-five',       loop: '24h',    icon: '🚇', name: 'Metro Nocne' },
      { id: '24h-minute',     loop: '24h',    icon: '🌐', name: 'Labirynt 24h' },
    ];

    const GAME_ICONS  = ['🔵', '✏️', '⚙️'];
    const STAR_LABELS = ['⭐', '⭐⭐', '⭐⭐⭐'];
    const GAME_NAMES  = ['Wybierz Godzinę', 'Wpisz Godzinę', 'Ustaw Wskazówki'];
    const GAME_PAGES  = ['godziny.html', 'wpisz.html', 'ustaw.html'];

    // ===== NODE STATUS HELPERS =====
    function getStarsDone(nodeId) {
      const n = _save.nodes[nodeId];
      if (!n) return [false, false, false];
      return [
        !!(n.star1 && n.star1.completed),
        !!(n.star2 && n.star2.completed),
        !!(n.star3 && n.star3.completed),
      ];
    }

    function getNodeStatus(nodeId, idx) {
      const [s1, s2, s3] = getStarsDone(nodeId);
      if (s1 && s2 && s3) return 'done';
      if (s1 || s2 || s3) return 'current';
      if (idx === 0) return 'current';
      const prev = NODE_CONFIG[idx - 1];
      const [prevS1, prevS2, prevS3] = getStarsDone(prev.id);
      // Granica pętli: pierwsza wyspa nowej pętli wymaga WSZYSTKICH 3 gwiazdek ostatniej wyspy poprzedniej pętli
      if (NODE_CONFIG[idx].loop !== prev.loop) {
        return (prevS1 && prevS2 && prevS3) ? 'current' : 'locked';
      }
      // W obrębie pętli: wystarczy pierwsza gwiazdka poprzedniej wyspy
      return prevS1 ? 'current' : 'locked';
    }

    // ===== BUILD PATH =====
    function buildPath() {
      const container = document.getElementById('pathContainer');
      container.innerHTML = '';
      let prevLoop = null;

      NODE_CONFIG.forEach((node, idx) => {
        // Loop separator before first node of each new loop (skip loop 1)
        if (node.loop !== prevLoop && prevLoop !== null) {
          const lm  = LOOP_CONFIG[node.loop];
          const sep = document.createElement('div');
          sep.className = 'path-node loop-sep';
          sep.innerHTML = `
            <div class="node-dot top"></div>
            <div class="node-tile">
              <span class="loop-sep-icon">${lm.icon}</span>
              <span class="loop-sep-label">${lm.label}</span>
            </div>
            <div class="node-dot bottom"></div>`;
          container.appendChild(sep);
        }
        prevLoop = node.loop;

        const status      = getNodeStatus(node.id, idx);
        const starsDone   = getStarsDone(node.id);
        const earned      = starsDone.filter(Boolean).length;
        const progressPct = Math.round((earned / 3) * 100);
        const isFirst     = idx === 0;

        let badge = '';
        if      (status === 'done')    badge = `<span class="node-badge badge-done">✓ Ukończone</span>`;
        else if (status === 'current') badge = `<span class="node-badge badge-current">▶ W toku</span>`;
        else                           badge = `<span class="node-badge badge-locked">🔒</span>`;

        const el = document.createElement('div');
        el.className    = `path-node ${status}`;
        el.dataset.node = node.id;
        el.innerHTML = `
          ${!isFirst ? '<div class="node-dot top"></div>' : ''}
          <div class="node-tile"${status !== 'locked' ? ' role="button" tabindex="0"' : ''}>
            ${badge}
            <div class="node-icon">${node.icon}</div>
            <div class="node-body">
              <div class="node-name">${node.name}</div>
              <div class="node-stars">
                <span class="star ${starsDone[0] ? 'earned' : ''}">⭐</span>
                <span class="star ${starsDone[1] ? 'earned' : ''}">⭐</span>
                <span class="star ${starsDone[2] ? 'earned' : ''}">⭐</span>
              </div>
              <div class="node-progress-bar">
                <div class="node-progress-fill" style="width:${progressPct}%"></div>
              </div>
            </div>
          </div>
          <div class="node-dot bottom"></div>`;

        if (status !== 'locked') {
          const tile = el.querySelector('.node-tile');
          tile.addEventListener('click', () => openPopup(node.id));
          tile.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPopup(node.id); }
          });
        }
        container.appendChild(el);
      });

      // Path end
      const endEl = document.createElement('div');
      endEl.className = 'path-end';
      endEl.innerHTML = `<div class="path-end-dot">🏆</div><div class="path-end-label">Mistrz Czasu</div>`;
      container.appendChild(endEl);
    }

    // ===== STAR POPUP =====
    function openPopup(nodeId) {
      const nodeConf = NODE_CONFIG.find(n => n.id === nodeId);
      if (!nodeConf) return;
      const nodeIdx   = NODE_CONFIG.findIndex(n => n.id === nodeId);
      const starsDone = getStarsDone(nodeId);

      document.getElementById('popupIcon').textContent  = nodeConf.icon;
      document.getElementById('popupTitle').textContent = nodeConf.name;

      const cont = document.getElementById('starOptions');
      cont.innerHTML = '';

      starsDone.forEach((done, idx) => {
        // Gwiazdka idx jest dostępna gdy:
        // - idx=0 (pierwsza gwiazdka zawsze dostępna na odblokowanej wyspie), LUB
        // - poprzednia gwiazdka tej wyspy jest zdobyta ORAZ ta sama gwiazdka poprzedniej wyspy jest zdobyta
        const prevIslandStars = nodeIdx > 0 ? getStarsDone(NODE_CONFIG[nodeIdx - 1].id) : [true, true, true];
        const accessible = idx === 0 || (!!starsDone[idx - 1] && !!prevIslandStars[idx]);
        const isNext   = !done && accessible;
        const isLocked = !done && !accessible;

        const statusHtml = done
          ? `<span class="star-opt-status status-done">✓</span>`
          : isNext
            ? `<span class="star-opt-status status-play">▶</span>`
            : `<span class="star-opt-status status-locked">🔒</span>`;

        const btn = document.createElement('button');
        btn.className = `star-opt-btn${done ? ' earned' : ''}`;
        btn.innerHTML = `
          <span class="star-opt-game-icon">${GAME_ICONS[idx]}</span>
          <div class="star-opt-body"><div class="star-opt-name">${GAME_NAMES[idx]}</div></div>
          <span class="star-opt-stars">${STAR_LABELS[idx]}</span>
          ${statusHtml}`;

        if (isLocked) {
          btn.style.opacity = '0.45';
          btn.style.cursor  = 'default';
          btn.disabled      = true;
        } else {
          btn.addEventListener('click', () => {
            closePopup();
            document.body.classList.remove('page-loaded');
            setTimeout(() => {
              location.href = `${GAME_PAGES[idx]}?node=${nodeId}&star=${idx + 1}`;
            }, 220);
          });
        }
        cont.appendChild(btn);
      });

      document.getElementById('starPopup').classList.add('active');
    }

    function closePopup() {
      document.getElementById('starPopup').classList.remove('active');
    }

    document.getElementById('starPopup').addEventListener('click', e => {
      if (e.target === document.getElementById('starPopup')) closePopup();
    });

    // ===== FAB HINT =====
    let _hintOpen  = false;
    let _hintTimer = null;

    document.getElementById('fabHint').addEventListener('click', () => {
      _hintOpen ? _closeHint() : _openHint();
    });

    function _openHint() {
      _hintOpen = true;
      const fab   = document.getElementById('fabHint');
      const toast = document.getElementById('hintToast');
      const bar   = document.getElementById('hintBar');
      fab.classList.add('active');
      toast.classList.remove('auto-close');
      toast.classList.add('visible');
      bar.style.transition = 'none';
      bar.style.transform  = 'scaleX(0)';
      void bar.offsetWidth; // reflow
      toast.classList.add('auto-close');
      clearTimeout(_hintTimer);
      _hintTimer = setTimeout(_closeHint, 5000);
    }

    function _closeHint() {
      _hintOpen = false;
      clearTimeout(_hintTimer);
      document.getElementById('fabHint').classList.remove('active');
      const toast = document.getElementById('hintToast');
      toast.classList.remove('visible', 'auto-close');
    }

    // ===== INIT =====
    buildPath();

    // Scroll to first current (or locked) node
    const focusNode = document.querySelector('.path-node.current') ||
                      document.querySelector('.path-node');
    if (focusNode) {
      requestAnimationFrame(() => {
        focusNode.scrollIntoView({ behavior: 'instant', block: 'center' });
      });
    }
  </script>
  <script src="transitions.js"></script>
</body>
</html>
