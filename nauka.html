<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nauka godzin - Tryb Interaktywny</title>
  <link rel="stylesheet" href="clock-styles.css" />
  <link rel="stylesheet" href="layout.css" />
  <style>
    #timeDisplay {
      width: 100%;
      min-height: var(--btn-height);
      background: #111;
      border: 2px solid #222;
      border-radius: var(--btn-radius);
      font-size: var(--btn-font);
      font-weight: 600;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="start.html" title="Wróć do menu">
    <svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </a>
  <div class="topbar-right">
    <button class="help-btn" id="helpBtn">?</button>
  </div>
</div>

<div class="feedback-bar" id="hintArea">Przeciągnij wskazówki zegara palcem. Wskazówka minutowa jest dłuższa, godzinowa krótsza.</div>

<div class="clock-wrap" id="clockContainer"></div>

<div class="content-area">
  <p id="timeDisplay">12:00</p>
</div>

<script src="clock-renderer.js"></script>
<script>
  // ==================== Load Global Settings ====================
  const STORAGE_KEYS = {
    clockBg: 'zegar_clockBg',
    handColor: 'zegar_handColor',
    numberStyle: 'zegar_numberStyle',
  };

  function loadGlobalSettings() {
    return {
      clockBg: localStorage.getItem(STORAGE_KEYS.clockBg) || 'solid',
      handColor: localStorage.getItem(STORAGE_KEYS.handColor) || 'white',
      numberStyle: localStorage.getItem(STORAGE_KEYS.numberStyle) || 'arabic',
    };
  }

  const globalSettings = loadGlobalSettings();

  const clockContainer = document.getElementById("clockContainer");
  const display = document.getElementById("timeDisplay");

  let isPm = false;

  function updateDisplay(h, m) {
    const displayH = isPm && h < 12 ? h + 12 : h;
    display.textContent = String(displayH).padStart(2, "0") + ":" + String(m).padStart(2, "0");
  }

  const clock = new ClockRenderer(clockContainer, {
    size: 'normal',
    interactive: true,
    showBrand: true,
    showDigital: true,
    showDate: true,
    showAmPm: true,
    showSecondHand: true,
    showBgControls: false,
    handColor: globalSettings.handColor,
    onTimeChange: (h, m) => updateDisplay(h, m),
  });

  // Apply background from global settings
  clock.setBackground(globalSettings.clockBg);
  clock.setNumberStyle(globalSettings.numberStyle);
  clock.setAmPm(false);

  // Make ampm-display clickable to toggle AM/PM
  const ampmEl = clockContainer.querySelector('.ampm-display');
  if (ampmEl) {
    ampmEl.style.cursor = 'pointer';
    ampmEl.title = 'Kliknij, aby zmienić rano / po południu';
    ampmEl.addEventListener('click', () => {
      isPm = !isPm;
      clock.setAmPm(isPm);
      const t = clock.getTime();
      updateDisplay(t.h, t.m);
    });
  }

  const helpBtn = document.getElementById('helpBtn');
  const hintArea = document.getElementById('hintArea');
  helpBtn.addEventListener('click', () => {
    hintArea.classList.toggle('active');
    helpBtn.classList.toggle('active');
  });
</script>

<script src="transitions.js"></script>
</body>
</html>
